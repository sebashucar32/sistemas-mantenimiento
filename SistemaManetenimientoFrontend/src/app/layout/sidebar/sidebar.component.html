<aside
  class="flex flex-col border-r border-blue-100 bg-blue-50/70 transition-[width] duration-200"
  [style.width]="layoutService.sidebarWidth()"
>
  <nav class="flex-1 overflow-y-auto p-3" aria-label="Navegación principal">
    <ul class="space-y-1">
      @for (item of layoutService.navItems(); track item.route + item.label) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="bg-blue-600 text-white shadow-sm"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="layoutService.setActiveNavRoute(item.route)"
            class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-blue-900 transition hover:bg-blue-100"
            [class.justify-center]="layoutService.sidebarCollapsed()"
            [title]="item.label"
          >
            <span
              class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-md bg-white text-blue-700 shadow-sm"
              aria-hidden="true"
            >
              @switch (item.icon) {
                @case ('home') {
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    class="h-4 w-4"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M3 10.5 12 3l9 7.5M5 10v10h14V10"
                    />
                  </svg>
                }
                @case ('equipment') {
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    class="h-4 w-4"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0 0-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0 0-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0 0-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0 0-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0 0 1.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065Z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                    />
                  </svg>
                }
                @case ('maintenance') {
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    class="h-4 w-4"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.51m.345-3.978a2.105 2.105 0 1 1 2.99 2.99L7.83 8.167"
                    />
                  </svg>
                }
                @default {
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    class="h-4 w-4"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M9 17v-2m3 2v-4m3 4v-6M4 19h16a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1H8l-4 4v10a1 1 0 0 0 1 1Z"
                    />
                  </svg>
                }
              }
            </span>

            @if (!layoutService.sidebarCollapsed()) {
              <span>{{ item.label }}</span>
            }
          </a>
        </li>
      }
    </ul>
  </nav>
</aside>
